<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#317EFB"/>
    <link rel="icon" href="{{ url_for('static', filename='img/ilogo_F-Photoroom.png') }}" type="image/png">

    <title>FOFIGEST — Restablecer contraseña</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,900" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/all.min.css') }}" rel="stylesheet" type="text/css">
    <link href="{{ url_for('static', filename='css/sb-admin-2.min.css') }}" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to right, rgba(93, 173, 226, 0.8), rgba(52, 152, 219, 0.8)),
                url('https://cdn.pixabay.com/photo/2017/08/30/11/36/background-2698595_1280.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container { max-width: 420px; width: 100%; padding: 1rem; }

        .card {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.97);
            padding: 2.5rem;
            border: none;
        }

        .card img { width: 100%; margin-bottom: 1.25rem; }

        .input-group .btn-outline-secondary {
            border-color: #ddd;
            color: #666;
            background: white;
            border-left: none;
        }
        .input-group .form-control { border-right: none; }

        .password-strength { height: 5px; border-radius: 3px; margin-top: 4px; transition: all 0.3s; }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img class="img-thumbnail" src="{{ url_for('static', filename='img/Logo.png') }}" alt="Logo FOFIGEST">

            <div class="text-center mb-3">
                <h1 class="h4 text-gray-900">Nueva contraseña</h1>
                <p class="text-muted small">Elige una contraseña segura para tu cuenta.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-3">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('reset_with_token', token=token) }}">
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Nueva contraseña</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Mínimo 8 caracteres" minlength="8" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                            <i class="fas fa-eye" id="iconPwd"></i>
                        </button>
                    </div>
                    <div class="password-strength bg-secondary mt-1" id="strengthBar" style="width:0%"></div>
                    <small class="text-muted" id="strengthText"></small>
                </div>

                <div class="mb-3">
                    <label for="confirm_password" class="form-label fw-semibold">Confirmar contraseña</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" placeholder="Repite la contraseña" required>
                        <button class="btn btn-outline-secondary" type="button" id="toggleConfirm">
                            <i class="fas fa-eye" id="iconConfirm"></i>
                        </button>
                    </div>
                    <small class="text-danger d-none" id="mismatchMsg">Las contraseñas no coinciden</small>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="submitBtn">
                    <i class="fas fa-lock me-2"></i>Guardar nueva contraseña
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{{ url_for('login') }}" class="text-decoration-none small" style="color:#5a67d8;">
                    <i class="fas fa-arrow-left me-1"></i>Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.0/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleField(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }
        document.getElementById('togglePwd').addEventListener('click', () => toggleField('password', 'iconPwd'));
        document.getElementById('toggleConfirm').addEventListener('click', () => toggleField('confirm_password', 'iconConfirm'));

        // Indicador de fortaleza de contraseña
        document.getElementById('password').addEventListener('input', function () {
            const val = this.value;
            const bar = document.getElementById('strengthBar');
            const txt = document.getElementById('strengthText');
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const levels = [
                { pct: '25%', cls: 'bg-danger', label: 'Muy débil' },
                { pct: '50%', cls: 'bg-warning', label: 'Débil' },
                { pct: '75%', cls: 'bg-info',    label: 'Buena' },
                { pct: '100%', cls: 'bg-success', label: 'Fuerte' },
            ];
            const level = levels[Math.max(score - 1, 0)];
            bar.style.width = val.length ? level.pct : '0%';
            bar.className = 'password-strength mt-1 ' + (val.length ? level.cls : 'bg-secondary');
            txt.textContent = val.length ? level.label : '';
        });

        // Validación de coincidencia en tiempo real
        document.getElementById('confirm_password').addEventListener('input', function () {
            const pwd = document.getElementById('password').value;
            const msg = document.getElementById('mismatchMsg');
            msg.classList.toggle('d-none', this.value === pwd || this.value === '');
        });
    </script>
</body>
</html>
