<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Página de inicio de sesión - FOFIGEST">
    <meta name="theme-color" content="#317EFB"/>
    <link rel="icon" href="{{ url_for('static', filename='img/ilogo_F-Photoroom.png') }}" type="image/png">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo_F-Photoroom.png') }}" type="image/png">
    <link rel="manifest" href="{{ url_for('static', filename='js/manifest.json') }}">

    <title>Fofigest — Iniciar sesión</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,900" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/all.min.css') }}" rel="stylesheet" type="text/css">
    <link href="{{ url_for('static', filename='css/sb-admin-2.min.css') }}" rel="stylesheet">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to right, rgba(93, 173, 226, 0.8), rgba(52, 152, 219, 0.8)),
                url('https://cdn.pixabay.com/photo/2017/08/30/11/36/background-2698595_1280.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container { max-width: 420px; width: 100%; padding: 1rem; }

        .card {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border: none;
        }

        .card img { width: 100%; margin-bottom: 1.25rem; background-color: white; }

        .btn-primary-custom {
            background-color: #5a67d8;
            color: white;
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-primary-custom:hover { background-color: #4c5bc4; }

        .btn-otp {
            width: 100%;
            padding: 0.65rem;
            font-size: 0.95rem;
            border-radius: 6px;
            border: 2px solid #5a67d8;
            color: #5a67d8;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            margin-top: 0.75rem;
            transition: all 0.2s;
        }
        .btn-otp:hover { background-color: #5a67d8; color: white; }

        .divider { text-align: center; margin: 1rem 0; color: #aaa; font-size: 0.85rem; }

        .links { text-align: center; margin-top: 1rem; }
        .links a { color: #5a67d8; text-decoration: none; font-size: 0.9rem; }
        .links a:hover { text-decoration: underline; }

        /* Input group toggle ojo */
        .input-group .btn-outline-secondary {
            border-color: #ddd;
            color: #666;
        }
        .input-group .form-control { border-right: none; }
        .input-group .btn-outline-secondary { border-left: none; background: white; }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img class="img-thumbnail" src="static/img/Logo.png" alt="Logo FOFIGEST">

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-3">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
            {% endwith %}

            <div class="text-center mb-3">
                <h1 class="h4 text-gray-900">¡Bienvenido!</h1>
            </div>

            <form method="POST" action="{{ url_for('loginInp') }}">
                <div class="mb-3">
                    <label for="exampleInputEmail" class="form-label fw-semibold">Correo electrónico</label>
                    <input type="email" class="form-control" id="exampleInputEmail"
                           name="exampleInputEmail" placeholder="usuario@empresa.com" required>
                </div>

                <div class="mb-3">
                    <label for="exampleInputPassword" class="form-label fw-semibold">Contraseña</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="exampleInputPassword"
                               name="exampleInputPassword" placeholder="••••••••" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                                title="Mostrar/ocultar contraseña">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary-custom">
                    <i class="fas fa-sign-in-alt me-2"></i>       Iniciar Sesión
                </button>
            </form>

            <div class="divider">— o —</div>

            <a href="{{ url_for('login_otp') }}" class="btn-otp d-block text-center text-decoration-none">
                <i class="fas fa-mobile-alt me-2"></i>Ingresar con código único (OTP)
            </a>

            <hr class="my-3">

            <div class="links">
                <a href="{{ url_for('Olvidaste') }}">¿Olvidaste tu contraseña?</a>
                &nbsp;·&nbsp;
                <a href="{{ url_for('Nuevo_Usuario') }}">Crear una cuenta</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.0/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script de persistencia de sesión -->
    <script>
        // Verificar sesión guardada al cargar la página de login
        (function verificarSesionGuardada() {
            const sessionToken = localStorage.getItem('fofigest_session_token');
            const sessionCorreo = localStorage.getItem('fofigest_session_correo');
            
            if (sessionToken && sessionCorreo) {
                console.log('Sesión guardada encontrada, verificando validez...');
                
                // Verificar si la sesión sigue siendo válida en el servidor
                fetch('/api/verificar-sesion', {
                    method: 'GET',
                    credentials: 'include', // Importante para enviar cookies de sesión
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.ok && data.authenticated && data.session_token === sessionToken) {
                        console.log('Sesión válida, redirigiendo...');
                        // Sesión válida, redirigir al tablero o página correspondiente
                        window.location.href = data.redirect_url;
                    } else {
                        console.log('Sesión inválida o expirada, limpiando localStorage');
                        // Sesión inválida o expirada, limpiar localStorage
                        localStorage.removeItem('fofigest_session_token');
                        localStorage.removeItem('fofigest_session_correo');
                        localStorage.removeItem('fofigest_session_empresa');
                        localStorage.removeItem('fofigest_session_permisos');
                    }
                })
                .catch(error => {
                    console.error('Error al verificar sesión:', error);
                    // En caso de error, limpiar localStorage por seguridad
                    localStorage.removeItem('fofigest_session_token');
                    localStorage.removeItem('fofigest_session_correo');
                    localStorage.removeItem('fofigest_session_empresa');
                    localStorage.removeItem('fofigest_session_permisos');
                });
            }
        })();
        
        // Interceptar el submit del formulario de login para guardar en localStorage
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.querySelector('form');
            
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    // Guardar el correo temporalmente para usarlo después del login
                    const email = document.getElementById('exampleInputEmail').value;
                    sessionStorage.setItem('fofigest_temp_email', email);
                });
            }
        });
    </script>
    
    <script>
        // Toggle mostrar/ocultar contraseña
        document.getElementById('togglePassword').addEventListener('click', function () {
            const input = document.getElementById('exampleInputPassword');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register("{{ url_for('static', filename='js/sw.js') }}")
                .catch(function (error) { console.log('SW error:', error); });
        }
    </script>
</body>
</html>
