<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Fofigest — Cargando</title>
  <link rel="icon" href="{{ url_for('static', filename='img/logo_F-Photoroom.png') }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo_F-Photoroom.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='js/manifest.json') }}">
  <meta name="theme-color" content="#4e73df">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ── CONTAINER ── */
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.1rem;
      color: #fff;
      text-align: center;
      padding: 2rem;
      animation: splashFadeIn .5s ease forwards;
      transition: opacity .6s ease;
    }

    #splash.fade-out { opacity: 0; }

    /* ── LOGO ── */
    #splash-logo {
      width: 108px;
      height: 108px;
      object-fit: contain;
      background: #fff;
      border-radius: 50%;
      padding: .85rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.25);
      animation: splashZoom .6s ease .2s both;
    }

    /* ── TITLE ── */
    #splash-title {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -.5px;
      animation: splashSlideUp .5s ease .7s both;
    }

    #splash-subtitle {
      font-size: .92rem;
      opacity: .85;
      animation: splashSlideUp .5s ease .9s both;
    }

    #splash-version {
      font-size: .72rem;
      opacity: .55;
      animation: splashSlideUp .5s ease 1s both;
    }

    /* ── PROGRESS BAR ── */
    #splash-bar-wrap {
      width: min(320px, 80vw);
      height: 4px;
      background: rgba(255,255,255,.25);
      border-radius: 99px;
      overflow: hidden;
      margin-top: .4rem;
      animation: splashSlideUp .5s ease 1.1s both;
    }

    #splash-bar {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,.9);
      border-radius: 99px;
      animation: barFill 2.4s cubic-bezier(.4,0,.2,1) 1.3s forwards;
    }

    /* ── CYCLING WORDS ── */
    #splash-words {
      font-size: .85rem;
      opacity: .75;
      min-height: 1.3rem;
      transition: opacity .3s ease;
      animation: splashSlideUp .5s ease 1.2s both;
    }

    /* ── KEYFRAMES ── */
    @keyframes splashFadeIn  { from { opacity:0; transform:scale(.96) } to { opacity:1; transform:scale(1) } }
    @keyframes splashZoom    { from { transform:scale(.3); opacity:0 }   to { transform:scale(1); opacity:1 } }
    @keyframes splashSlideUp { from { transform:translateY(14px); opacity:0 } to { transform:translateY(0); opacity:1 } }
    @keyframes barFill       { from { width:0% }  to { width:100% } }
  </style>
</head>

<body>
  <div id="splash">
    <img id="splash-logo"
         src="{{ url_for('static', filename='img/logo_F-Photoroom.png') }}"
         alt="Fofigest">
    <h1 id="splash-title">Fofigest</h1>
    <p  id="splash-subtitle">Gestión de Proyectos y Tareas</p>
    <p  id="splash-version">Versión {{ v }}</p>
    <div id="splash-bar-wrap">
      <div id="splash-bar"></div>
    </div>
    <p id="splash-words">Preparando tu espacio de trabajo…</p>
  </div>

  <script>
    (function () {
      /* ── CONFIGURACIÓN ── */
      var REDIRECT_URL = {{ redirect_url | tojson }};
      var SPLASH_MS    = 3000;  // duración total del splash
      var FADE_MS      = 600;   // duración del fade-out antes de redirigir
      var SAFETY_MS    = 7000;  // timeout de seguridad absoluto

      /* ── CICLO DE PALABRAS ── */
      var words = [
        'Cargando proyectos…',
        'Validando sesión…',
        'Preparando el tablero…',
        'Casi listo…'
      ];
      var wordEl  = document.getElementById('splash-words');
      var wordIdx = 0;
      var wordTimer = setInterval(function () {
        wordIdx = (wordIdx + 1) % words.length;
        wordEl.style.opacity = '0';
        setTimeout(function () {
          wordEl.textContent = words[wordIdx];
          wordEl.style.opacity = '.75';
        }, 200);
      }, 750);

      /* ── REDIRECCION CON FADE-OUT ── */
      var redirected = false;
      function doRedirect() {
        if (redirected) return;
        redirected = true;
        clearInterval(wordTimer);
        var splash = document.getElementById('splash');
        if (splash) splash.classList.add('fade-out');
        setTimeout(function () {
          window.location.href = REDIRECT_URL;
        }, FADE_MS);
      }

      /* Temporizador principal */
      var primaryTimer = setTimeout(doRedirect, SPLASH_MS);

      /* Timeout de seguridad: redirige inmediatamente si algo falla */
      setTimeout(function () {
        clearTimeout(primaryTimer);
        redirected = false;   /* forzar incluso si fade-out estaba en curso */
        window.location.href = REDIRECT_URL;
      }, SAFETY_MS);
    })();
  </script>

  <!-- Script de persistencia de sesión en localStorage -->
  <script>
    (function guardarSesionEnLocalStorage() {
      // Obtener el email que se guardó temporalmente en sessionStorage durante el login
      const tempEmail = sessionStorage.getItem('fofigest_temp_email');
      
      // Llamar a la API para obtener los datos de la sesión actual
      fetch('/api/verificar-sesion', {
        method: 'GET',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json'
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.ok && data.authenticated) {
          // Guardar los datos de sesión en localStorage
          localStorage.setItem('fofigest_session_token', data.session_token);
          localStorage.setItem('fofigest_session_correo', data.correo);
          localStorage.setItem('fofigest_session_empresa', data.empresa);
          localStorage.setItem('fofigest_session_permisos', data.permisos);
          
          console.log('Sesión guardada en localStorage');
          
          // Limpiar el email temporal de sessionStorage
          sessionStorage.removeItem('fofigest_temp_email');
        }
      })
      .catch(error => {
        console.error('Error al guardar sesión en localStorage:', error);
      });
    })();
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker
          .register("{{ url_for('static', filename='js/sw.js') }}")
          .then(function (r) { console.log('SW registrado:', r.scope); })
          .catch(function (e) { console.warn('SW error:', e); });
      });
    }
  </script>
</body>
</html>
