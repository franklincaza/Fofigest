{% extends 'Base.html' %}
{% block content %}

<style>
  /* ── Dashboard Sulfoquímica: estilos específicos ── */
  .fondo_sulfo { background: linear-gradient(135deg, #2C6E49, #498205); color: #fff; }
  .fondo_sulfo p { color: rgba(255,255,255,.85); }

  .layout-dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr 280px;
    grid-template-rows: auto auto;
    gap: 1rem;
    margin-top: 1rem;
  }
  @media (max-width: 1100px) { .layout-dashboard { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 768px)  { .layout-dashboard { grid-template-columns: 1fr; } }

  /* Tabla */
  #dataTable thead th {
    background: var(--bg-page);
    color: var(--text-dark);
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
    border-bottom: 2px solid var(--border-color);
    white-space: nowrap;
    vertical-align: middle;
  }
  #dataTable tbody tr { transition: background var(--transition); }
  #dataTable tbody tr:hover { background: rgba(78,115,223,.04); }
  #dataTable td {
    vertical-align: middle;
    font-size: .875rem;
    color: var(--text-dark);
    border-color: var(--border-color);
  }

  /* Filtros por columna */
  #filter-row th { padding: .3rem .4rem; background: var(--bg-page); border-bottom: 1px solid var(--border-color); }
  .col-filter-input {
    font-family: 'Nunito', sans-serif;
    font-size: .73rem;
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    background: var(--bg-card);
    color: var(--text-dark);
    padding: .2rem .45rem;
    width: 100%;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .col-filter-input:focus { border-color: #4e73df; box-shadow: 0 0 0 .15rem rgba(78,115,223,.15); }
  .col-filter-input::placeholder { color: var(--text-muted); font-style: italic; }
  #dataTable thead tr:first-child th .fa-filter { opacity: .45; transition: opacity var(--transition); }
  #dataTable thead tr:first-child th:hover .fa-filter { opacity: 1; }

  /* Modo oscuro */
  .modo-oscuro #dataTable thead th    { background: #2d2d3a; color: #c3c3cd; border-color: #3c3c50; }
  .modo-oscuro #dataTable td          { color: #c3c3cd; border-color: #3c3c50; }
  .modo-oscuro #dataTable tbody tr:hover { background: rgba(255,255,255,.05); }
  .modo-oscuro .card                  { background: #1e1e2d !important; border-color: #3c3c50; }
  .modo-oscuro .card-header           { background: #2d2d3a !important; border-color: #3c3c50 !important; }
  .modo-oscuro #filter-row th         { background: #2d2d3a; border-color: #3c3c50; }
  .modo-oscuro .col-filter-input      { background: #252535; color: #c3c3cd; border-color: #3c3c50; }
</style>

<div class="container-fluid">

  <!-- Encabezado de marca -->
  <div class="d-flex align-items-center gap-3 p-3 rounded shadow mb-4 fondo_sulfo"
       style="border-radius: var(--radius)">
    <img src="https://www.sulfoquimica.com/images/logo.png" alt="logo"
         style="width: 56px; height: 56px; border-radius: 50%; object-fit: cover;">
    <div>
      <h2 class="mb-0 fw-bold" style="font-size: 1.4rem">Dashboard de Horas</h2>
      <p class="mb-0 small">Sulfoquímica S.A.S</p>
    </div>
  </div>

  <!-- Grid de gráficos + filtros -->
  <div class="layout-dashboard">

    <!-- Card: Horas por Mes -->
    <div class="card shadow mb-0" style="border-radius: var(--radius)">
      <div class="card-header py-3" style="border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0">
        <h6 class="m-0 fw-bold text-primary">
          <i class="fas fa-chart-bar me-2"></i>Horas por Mes
        </h6>
      </div>
      <div class="card-body">
        <canvas id="graficoHoras"></canvas>
      </div>
    </div>

    <!-- Card: Horas por Proyecto -->
    <div class="card shadow mb-0" style="border-radius: var(--radius)">
      <div class="card-header py-3" style="border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0">
        <h6 class="m-0 fw-bold text-primary">
          <i class="fas fa-project-diagram me-2"></i>Horas por Proyecto
        </h6>
      </div>
      <div class="card-body">
        <canvas id="graficoProyectos"></canvas>
      </div>
    </div>

    <!-- Card: Filtros -->
    <div class="card shadow mb-0" style="border-radius: var(--radius)">
      <div class="card-header py-3" style="border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0">
        <h6 class="m-0 fw-bold text-primary">
          <i class="fas fa-filter me-2"></i>Filtros
        </h6>
      </div>
      <div class="card-body">
        <label class="form-label fw-semibold small">Año</label>
        <select id="filtroAnio" class="form-select form-select-sm mb-3"></select>

        <label class="form-label fw-semibold small">Responsable</label>
        <select id="filtroResponsable" class="form-select form-select-sm mb-3"></select>

        <label class="form-label fw-semibold small">Proyecto</label>
        <select id="filtroProyecto" class="form-select form-select-sm" multiple style="height: 120px"></select>
      </div>
    </div>

  </div><!-- /layout-dashboard -->

  <!-- Card: Análisis por Responsable -->
  <div class="card shadow mt-4 mb-4" style="border-radius: var(--radius)">
    <div class="card-header py-3 d-flex align-items-center justify-content-between flex-wrap gap-2"
         style="border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0">
      <div class="d-flex align-items-center gap-2">
        <h6 class="m-0 fw-bold text-primary">
          <i class="fas fa-table me-2"></i>Análisis por Responsable
        </h6>
        <button class="btn btn-sm btn-outline-secondary" onclick="limpiarFiltros()"
                id="btnLimpiarFiltros" style="display:none" title="Limpiar filtros">
          <i class="fas fa-times me-1"></i>Limpiar Filtros
        </button>
      </div>
      <div class="input-group input-group-sm" style="width: 175px">
        <input type="text" id="buscador" class="form-control"
               placeholder="Buscar..." onkeyup="filtrarTabla()">
        <span class="input-group-text"><i class="fas fa-search"></i></span>
      </div>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive" style="max-height: 60vh; overflow-y: auto">
        <table class="table table-bordered table-hover mb-0" id="dataTable" cellspacing="0">
          <thead>
            <tr>
              <th>Responsable <i class="fas fa-filter fa-xs text-secondary ms-1"></i></th>
              <th class="text-center">Total Horas <i class="fas fa-filter fa-xs text-secondary ms-1"></i></th>
            </tr>
            <tr id="filter-row">
              <th><input type="text" class="col-filter-input" data-col="0" placeholder="Filtrar..." oninput="actualizarVisibilidad()" autocomplete="off"></th>
              <th><input type="text" class="col-filter-input" data-col="1" placeholder="Filtrar..." oninput="actualizarVisibilidad()" autocomplete="off"></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /container-fluid -->


<!-- ════════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let datosOriginales = [];
let proyectosData   = [];

async function cargarDatos() {
  try {
    const [responseDev, responseChart] = await Promise.all([
      fetch('/reporte_horas_chart_dev'),
      fetch('/reporte_horas_chart')
    ]);
    datosOriginales = await responseDev.json();
    proyectosData   = await responseChart.json();
    cargarFiltros();
    renderizarDashboard();
  } catch (error) {
    console.error('Error cargando datos:', error);
  }
}

function cargarFiltros() {
  const anios       = [...new Set(datosOriginales.map(d => d.anio))];
  const responsables = [...new Set(datosOriginales.map(d => d.responsable).filter(Boolean))];
  const proyectos   = [...new Set(proyectosData.map(d => d.codigo_proyecto).filter(Boolean))];

  document.getElementById('filtroAnio').innerHTML =
    '<option value="">Todos</option>' + anios.map(a => `<option value="${a}">${a}</option>`).join('');
  document.getElementById('filtroResponsable').innerHTML =
    '<option value="">Todos</option>' + responsables.map(r => `<option value="${r}">${r}</option>`).join('');
  document.getElementById('filtroProyecto').innerHTML =
    proyectos.map(p => `<option value="${p}">${p}</option>`).join('');

  document.getElementById('filtroAnio').addEventListener('change', renderizarDashboard);
  document.getElementById('filtroResponsable').addEventListener('change', renderizarDashboard);
  document.getElementById('filtroProyecto').addEventListener('change', renderizarDashboard);
}

function renderizarDashboard() {
  const anioSel       = document.getElementById('filtroAnio').value;
  const responsableSel = document.getElementById('filtroResponsable').value;
  const proyectosSel  = Array.from(document.getElementById('filtroProyecto').selectedOptions).map(o => o.value);

  let datos = datosOriginales;
  if (anioSel)        datos = datos.filter(d => d.anio == anioSel);
  if (responsableSel) datos = datos.filter(d => d.responsable === responsableSel);
  if (proyectosSel.length > 0) {
    const mesesFiltrados = proyectosData
      .filter(p => proyectosSel.includes(p.codigo_proyecto))
      .map(p => p.mes);
    datos = datos.filter(d => mesesFiltrados.includes(d.mes));
  }

  renderizarGraficoHoras(datos);
  renderizarGraficoProyectos(proyectosSel);
  renderizarTablaResponsables(datos);
}

function renderizarGraficoHoras(datos) {
  const resumen = {};
  datos.forEach(d => { if (!resumen[d.mes]) resumen[d.mes] = 0; resumen[d.mes] += d.total_horas_dedicadas; });
  const labels = Object.keys(resumen);
  const valores = labels.map(m => resumen[m]);
  const ctx = document.getElementById('graficoHoras').getContext('2d');
  if (window.miGraficoMes) window.miGraficoMes.destroy();
  window.miGraficoMes = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Total de Horas', data: valores, backgroundColor: '#498205' }] },
    options: { responsive: true, plugins: { legend: { display: false }, title: { display: true, text: 'Total de Horas por Mes' } } }
  });
}

function renderizarGraficoProyectos(proyectosSel) {
  const resumen = {};
  proyectosData
    .filter(d => proyectosSel.length === 0 || proyectosSel.includes(d.codigo_proyecto))
    .forEach(d => { if (!resumen[d.codigo_proyecto]) resumen[d.codigo_proyecto] = 0; resumen[d.codigo_proyecto] += d.horas_dedicadas; });
  const labels = Object.keys(resumen);
  const valores = labels.map(p => resumen[p]);
  const ctx = document.getElementById('graficoProyectos').getContext('2d');
  if (window.miGraficoProyecto) window.miGraficoProyecto.destroy();
  window.miGraficoProyecto = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Total de Horas', data: valores, backgroundColor: '#2C6E49' }] },
    options: { responsive: true, plugins: { legend: { display: false }, title: { display: true, text: 'Total de Horas por Proyecto' } } }
  });
}

function renderizarTablaResponsables(datos) {
  const resumen = {};
  datos.forEach(d => {
    const r = d.responsable || 'Sin Responsable';
    if (!resumen[r]) resumen[r] = 0;
    resumen[r] += d.total_horas_dedicadas;
  });
  const tbody = document.querySelector('#dataTable tbody');
  tbody.innerHTML = Object.entries(resumen)
    .map(([r, h]) => `<tr><td>${r}</td><td class="text-center">${h}</td></tr>`)
    .join('');
  actualizarVisibilidad();
}

/* ── Motor de filtrado combinado ── */
function actualizarVisibilidad() {
  const globalQ = (document.getElementById('buscador')?.value || '').toLowerCase().trim();
  const colFilters = {};
  document.querySelectorAll('#filter-row input[data-col]').forEach(inp => {
    const val = inp.value.toLowerCase().trim();
    if (val) colFilters[parseInt(inp.dataset.col)] = val;
  });
  const hayFiltros = globalQ || Object.keys(colFilters).length > 0;
  const btnLimpiar = document.getElementById('btnLimpiarFiltros');
  if (btnLimpiar) btnLimpiar.style.display = hayFiltros ? '' : 'none';

  document.querySelectorAll('#dataTable tbody tr').forEach(row => {
    if (globalQ && !row.textContent.toLowerCase().includes(globalQ)) { row.style.display = 'none'; return; }
    const cells = row.querySelectorAll('td');
    for (const [colIdx, term] of Object.entries(colFilters)) {
      const cell = cells[parseInt(colIdx)];
      if (cell && !cell.textContent.toLowerCase().includes(term)) { row.style.display = 'none'; return; }
    }
    row.style.display = '';
  });
}

function filtrarTabla()  { actualizarVisibilidad(); }

function limpiarFiltros() {
  document.querySelectorAll('#filter-row input').forEach(inp => inp.value = '');
  const b = document.getElementById('buscador'); if (b) b.value = '';
  actualizarVisibilidad();
}

cargarDatos();
</script>

{% endblock %}
